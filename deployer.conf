# deployer.conf — @mostajs/orm-mcp (MCP server, Streamable HTTP)
# Auteur : Dr Hamid MADANI <drmdh@msn.com>

APP_NAME="orm-mcp"
APP_DOMAIN="orm-mcp.amia.fr"
APP_PORT=14510

SSH_HOST="amia"
SSH_USER="hmd"
REMOTE_DIR="/home/hmd/prod/orm-mcp"

SOURCE_DIR="$(pwd)"

# Serveur MCP en mode HTTP (Streamable). PORT vient du .env (lu par PM2).
START_SCRIPT="dist/index.js"
START_INTERPRETER="node"
START_ARGS="--http"

# GET / renvoie un JSON d'info (name/version/tools) → health.
HEALTH_PATH="/"
HEALTH_HOST="127.0.0.1"

INCLUDE_FILES=(
  "package.json"
  "package-lock.json"
  "dist"
  "ecosystem.config.cjs"
)

# Pas de secrets dans ce service (outil de schéma sans état) — .env = juste PORT.
PRESERVE_ENV="true"
ENV_FILE_SOURCE=".env.production"

# dist/ est prébuildé et transféré : on n'installe que les deps runtime.
NPM_INSTALL_CMD="npm install --omit=dev"

APACHE_VHOST_TPL="templates/apache-vhost.conf.tpl"
APACHE_VHOST_NAME="${APP_DOMAIN}.conf"
